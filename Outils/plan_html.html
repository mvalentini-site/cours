<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plan de classe</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#FAFAFA;padding:16px;min-height:100vh}
h2{text-align:center;margin-bottom:10px;font-size:1.4rem;color:#212121}

/* Classes */
#class-bar{display:flex;align-items:center;justify-content:center;gap:6px;flex-wrap:wrap;margin-bottom:10px;padding:8px;background:white;border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,.1)}
.class-tab{display:flex;align-items:center;gap:4px;padding:5px 10px;border-radius:6px;cursor:pointer;background:#EEEEEE;border:2px solid transparent;font-size:13px;font-weight:bold;transition:all .15s}
.class-tab:hover{background:#E0E0E0}
.class-tab.active{background:#1565C0;color:white}
.class-tab button{background:none;border:none;cursor:pointer;color:inherit;opacity:.7;font-size:12px;padding:1px 3px}
.class-tab button:hover{opacity:1}
#btn-new-class{padding:5px 12px;border:2px dashed #9E9E9E;border-radius:6px;background:none;cursor:pointer;font-size:13px;color:#757575;font-weight:bold}
#btn-new-class:hover{border-color:#1565C0;color:#1565C0}

/* Toolbar */
.toolbar{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.toolbar button{padding:6px 14px;border:none;border-radius:4px;cursor:pointer;font-size:13px;font-weight:bold;transition:background .15s}
.btn-tab{background:#E0E0E0;color:#333}.btn-tab.active{background:#1565C0;color:white}
.btn-view{background:#E0E0E0;color:#333}.btn-view.active{background:#0277BD;color:white}
.btn-reset{background:#B71C1C;color:white}
.sep{width:1px;background:#CCC;margin:0 2px}

/* Plan */
#status{text-align:center;color:#E65100;font-size:12px;min-height:18px;margin-bottom:6px;font-weight:bold}
#grid{display:flex;flex-direction:column;align-items:center}
.row{display:flex;gap:6px;margin-bottom:6px;align-items:center}
.gap-col{width:20px;border-left:3px dashed #BDBDBD;height:62px}
.cell{width:128px;height:62px;border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:11px;font-weight:bold;text-align:center;padding:4px 2px;box-shadow:1px 1px 3px rgba(0,0,0,.12);transition:all .15s;user-select:none;cursor:default}
.cell.clickable{cursor:pointer}
.cell.selected{background:#FFA726!important;border-color:#E65100!important;box-shadow:0 0 10px #FFA72688!important}
.cell .grp-label{font-size:9px;margin-bottom:2px}
.cell .empty{color:#BDBDBD;font-size:18px}
.tableau{width:860px;background:#424242;color:white;text-align:center;padding:8px;border-radius:4px;font-weight:bold;letter-spacing:2px;font-size:13px;margin:8px 0}
.legend{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:14px}
.legend-item{display:flex;align-items:center;gap:4px;font-size:11px}
.legend-swatch{width:16px;height:16px;border-radius:3px;border-width:1px;border-style:solid}

/* Outils */
#outils-panel{max-width:700px;margin:0 auto;display:flex;flex-direction:column;gap:16px}
.feu-card,.timer-card{background:white;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.12);overflow:hidden}
.feu-card h3,.timer-card h3{padding:12px 16px;background:#37474F;color:white;font-size:14px;letter-spacing:1px}
.feu-buttons{display:flex}
.feu-btn{flex:1;padding:18px 10px;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:8px;font-weight:bold;font-size:13px;transition:all .3s;border-right:1px solid rgba(255,255,255,.2);background:#E0E0E0;color:#777}
.feu-btn:last-child{border-right:none}
.feu-btn.feu-active{color:white;box-shadow:inset 0 -5px 0 rgba(0,0,0,.2)}
.feu-btn.feu-active.fb-rouge{background:#E53935}.feu-btn.feu-active.fb-orange{background:#FB8C00}
.feu-btn.feu-active.fb-vert{background:#43A047}.feu-btn.feu-active.fb-bleu{background:#1E88E5}
.feu-btn .fb-icon{font-size:36px;line-height:1}.feu-btn .fb-label{font-size:12px;font-weight:900;text-transform:uppercase}
.feu-btn .fb-sub{font-size:10px;opacity:.85;text-align:center}
.feu-display{padding:16px 20px;display:flex;align-items:center;justify-content:center;gap:14px;transition:background .35s,color .35s;background:#EEEEEE;color:#9E9E9E;min-height:72px;border-top:1px solid #E0E0E0;cursor:pointer}
.feu-display .fd-icon{font-size:40px}.feu-display .fd-label{font-size:24px;font-weight:900;text-transform:uppercase}
.feu-display .fd-sub{font-size:13px;margin-top:3px;opacity:.8}
.timer-body{padding:20px;display:flex;flex-direction:column;align-items:center;gap:14px}
#timer-display{font-size:64px;font-weight:900;font-variant-numeric:tabular-nums;letter-spacing:4px;color:#212121;transition:color .3s;line-height:1}
#timer-display.t-running{color:#1565C0}
#timer-display.t-done{color:#C62828;animation:blink .5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.timer-set{display:flex;align-items:center;gap:8px;font-size:14px;color:#555}
.t-adj{width:32px;height:32px;border:none;border-radius:6px;background:#E0E0E0;cursor:pointer;font-size:18px;font-weight:bold}
.t-adj:hover{background:#BDBDBD}
#timer-min{width:56px;padding:5px;border:2px solid #CCC;border-radius:6px;text-align:center;font-size:18px;font-weight:bold}
.timer-btns{display:flex;gap:10px}
.t-start{padding:9px 28px;background:#1565C0;color:white;border:none;border-radius:6px;cursor:pointer;font-size:15px;font-weight:bold;min-width:130px}
.t-start:hover{background:#0D47A1}
.t-reset-btn{padding:9px 18px;background:#E0E0E0;color:#333;border:none;border-radius:6px;cursor:pointer;font-size:15px;font-weight:bold}
.timer-presets{display:flex;gap:6px;flex-wrap:wrap;justify-content:center}
.t-preset{padding:5px 12px;background:#EDE7F6;color:#6A1B9A;border:none;border-radius:20px;cursor:pointer;font-size:12px;font-weight:bold}

/* ── NOTES ── */
#notes-panel{max-width:860px;margin:0 auto}

.notes-top-bar{display:flex;align-items:center;gap:8px;margin-bottom:10px;background:white;padding:10px 12px;border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,.1)}
.notes-top-bar label{font-size:13px;font-weight:bold;white-space:nowrap}
.notes-top-bar input{flex:1;padding:5px 8px;border:1px solid #CCC;border-radius:4px;font-size:13px}

/* Activités globales */
.global-acts-card{background:white;border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,.1);margin-bottom:10px;overflow:hidden}
.global-acts-head{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:#E8EAF6;border-bottom:1px solid #C5CAE9}
.global-acts-head .ga-title{font-size:13px;font-weight:bold;color:#283593}
.btn-add-global{padding:5px 12px;background:#3949AB;color:white;border:none;border-radius:4px;cursor:pointer;font-size:12px;font-weight:bold}
.btn-add-global:hover{background:#283593}
.ga-add-form{display:none;padding:10px 14px;background:#F3F4FC;border-bottom:1px solid #C5CAE9;align-items:center;gap:8px;flex-wrap:wrap}
.ga-add-form.visible{display:flex}
.ga-add-form input{padding:5px 8px;border:1px solid #C5CAE9;border-radius:4px;font-size:13px}
.ga-add-form .ga-inp-nom{flex:1;min-width:150px}
.ga-add-form .ga-inp-coeff{width:60px;text-align:center}
.ga-add-form label{font-size:12px;color:#555;white-space:nowrap}
.ga-add-form .ga-btn-ok{padding:5px 14px;background:#43A047;color:white;border:none;border-radius:4px;cursor:pointer;font-weight:bold;font-size:13px}
.ga-add-form .ga-btn-cancel{padding:5px 10px;background:#E0E0E0;border:none;border-radius:4px;cursor:pointer;font-size:13px}
.ga-list{padding:8px 14px;display:flex;flex-direction:column;gap:4px}
.ga-empty{font-size:12px;color:#9E9E9E;font-style:italic;padding:6px 0}
.ga-row{display:flex;align-items:center;gap:8px}
.ga-row input{padding:4px 7px;border:1px solid #E0E0E0;border-radius:4px;font-size:12px;background:white}
.ga-row input:focus{outline:none;border-color:#3949AB}
.ga-row .ga-inp-nom{flex:1}
.ga-row .ga-inp-coeff{width:52px;text-align:center}
.ga-row .ga-lbl{font-size:11px;color:#9E9E9E;white-space:nowrap}
.ga-row .ga-del{background:none;border:none;color:#BDBDBD;cursor:pointer;font-size:16px;padding:2px 6px}
.ga-row .ga-del:hover{color:#C62828}

/* Mini plan */
.mini-plan{display:flex;flex-direction:column;align-items:center}
.mini-row{display:flex;gap:8px;margin-bottom:8px}
.grp-tile{width:200px;min-height:80px;border-radius:8px;border:2px solid transparent;cursor:pointer;padding:8px 10px;transition:all .2s}
.grp-tile:hover{transform:translateY(-2px);box-shadow:0 4px 10px rgba(0,0,0,.15)}
.grp-tile.selected-grp{border-width:3px;box-shadow:0 0 0 3px rgba(21,101,192,.35)}
.gt-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.gt-num{font-size:12px;font-weight:bold}
.gt-grades{display:flex;gap:4px}
.gt-badge{font-size:11px;font-weight:bold;padding:1px 6px;border-radius:4px}
.gt-names{font-size:10px;color:#444;line-height:1.5}
.mini-gap{width:20px;border-left:3px dashed #BDBDBD;height:80px;align-self:center}
.mini-tableau{width:416px;background:#424242;color:white;text-align:center;padding:6px;border-radius:4px;font-weight:bold;letter-spacing:2px;font-size:12px;margin-top:4px}

/* Détail groupe */
#grp-detail{margin-top:14px}
.det-header{border-radius:8px 8px 0 0;padding:12px 14px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;background:white;border-bottom:2px solid #E0E0E0}
.dh-left{display:flex;align-items:center;gap:10px}
.nav-btn{width:32px;height:32px;border:none;border-radius:50%;cursor:pointer;font-size:15px;font-weight:bold;background:#E0E0E0;color:#333}
.nav-btn:hover{background:#BDBDBD}
.dh-title{font-size:15px;font-weight:bold}.dh-members{font-size:11px;color:#555;margin-top:2px}
.dh-grades{display:flex;gap:12px;align-items:center}
.grade-box{text-align:center}
.gb-lbl{font-size:9px;font-weight:bold;color:#555;text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
.grade-pill{display:inline-flex;align-items:center;justify-content:center;border-radius:6px;font-weight:bold;padding:4px 10px}
.grade-pill.sm{font-size:14px}.grade-pill.lg{font-size:22px;padding:6px 14px}

.section-card{background:white;border-left:1px solid #E0E0E0;border-right:1px solid #E0E0E0;border-bottom:1px solid #E0E0E0}
.sec-head{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:#ECEFF1;border-bottom:1px solid #E0E0E0;flex-wrap:wrap;gap:6px}
.sec-head .sec-title{font-size:13px;font-weight:bold;color:#37474F}
.sec-head-right{display:flex;align-items:center;gap:8px}

/* Notes d'activités par groupe */
.act-notes-table{width:100%;border-collapse:collapse}
.act-notes-table th{font-size:11px;color:#757575;font-weight:bold;padding:6px 12px;background:#FAFAFA;border-bottom:1px solid #E0E0E0;text-align:left}
.act-notes-table td{padding:6px 12px;border-bottom:1px solid #F5F5F5;vertical-align:middle;font-size:13px}
.act-notes-table tr:last-child td{border-bottom:none}
.act-notes-table .td-coeff{color:#9E9E9E;font-size:12px;text-align:center}
.act-note-inp{width:70px;padding:4px 7px;border:1px solid #E0E0E0;border-radius:4px;font-size:13px;text-align:center;background:white}
.act-note-inp:focus{outline:none;border-color:#1565C0}
.act-empty{padding:12px;text-align:center;color:#9E9E9E;font-size:12px;font-style:italic}

/* Attitudes */
.att-coeff-row{display:flex;align-items:center;gap:6px;font-size:12px;color:#555}
.att-coeff-row input{width:46px;padding:3px;border:1px solid #CCC;border-radius:4px;font-size:12px;text-align:center}
.btn-toggle{padding:4px 10px;background:#E0E0E0;border:none;border-radius:4px;cursor:pointer;font-size:12px;font-weight:bold;color:#555}
.btn-toggle:hover{background:#BDBDBD}
.grille-collapse{display:none}
.grille-collapse.open{display:block}
.grille-head{display:grid;grid-template-columns:1fr 90px 1fr;background:#37474F;color:white;font-size:12px;font-weight:bold;text-align:center;padding:7px 10px}
.grille-head .hm{color:#EF9A9A}.grille-head .hb{color:#A5D6A7}
.gline{display:grid;grid-template-columns:1fr 90px 1fr;align-items:center;padding:5px 8px;border-bottom:1px solid #F0F0F0}
.gline:last-child{border-bottom:none}.gline:hover{background:#FAFAFA}
.side-malus{display:flex;align-items:center;justify-content:flex-end;gap:6px}
.side-bonus{display:flex;align-items:center;justify-content:flex-start;gap:6px}
.crit-lbl{font-size:12px;color:#333;line-height:1.2}.crit-lbl.ml{text-align:right}
.counter{display:flex;align-items:center;gap:3px}
.counter button{width:22px;height:22px;border:none;border-radius:4px;cursor:pointer;font-size:14px;font-weight:bold;display:flex;align-items:center;justify-content:center}
.c-dec{background:#FFCDD2;color:#C62828}.c-dec:hover{background:#EF9A9A}
.c-inc{background:#C8E6C9;color:#2E7D32}.c-inc:hover{background:#A5D6A7}
.c-val{min-width:22px;text-align:center;font-size:13px;font-weight:bold}
.pts-lbl{font-size:10px;font-weight:bold;width:36px;text-align:center;border-radius:3px;padding:2px 0}
.pts-lbl.mp{color:#C62828;background:#FFCDD2}.pts-lbl.bp{color:#2E7D32;background:#C8E6C9}
.totals-bar{background:#ECEFF1;padding:8px;text-align:center;font-size:12px;display:flex;justify-content:center;gap:16px;border-top:1px solid #CFD8DC}

/* Note de chapitre */
.chap-card{background:white;border:1px solid #E0E0E0;border-top:none;border-radius:0 0 8px 8px;margin-bottom:10px;padding:14px 16px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.chap-formula{flex:1;min-width:200px}
.cf-title{font-size:11px;font-weight:bold;color:#757575;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.cf-line{font-size:12px;color:#444;padding:3px 0;display:flex;justify-content:space-between;align-items:center;border-bottom:1px dashed #F0F0F0}
.cf-line:last-child{border-bottom:none;padding-top:5px;font-weight:bold;color:#333}
.cf-pts{font-weight:bold;color:#555}
.chap-result{text-align:center}
.cr-lbl{font-size:11px;font-weight:bold;color:#555;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.chap-note{font-size:40px;font-weight:900;padding:8px 22px;border-radius:10px;line-height:1}
.chap-hint{font-size:10px;color:#9E9E9E;margin-top:4px}

.obs-block{background:white;border-radius:8px;padding:12px;box-shadow:0 1px 4px rgba(0,0,0,.1);margin-bottom:10px}
.obs-block label{font-size:13px;font-weight:bold;display:block;margin-bottom:6px}
.obs-block textarea{width:100%;padding:7px;border:1px solid #CCC;border-radius:4px;font-size:13px;resize:vertical;min-height:52px}
.detail-actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end;margin-bottom:4px}
.btn-act{padding:6px 14px;border:none;border-radius:4px;cursor:pointer;font-size:13px;font-weight:bold}
.btn-clear{background:#FF7043;color:white}.btn-export{background:#6A1B9A;color:white}
.btn-next-grp{background:#1565C0;color:white;flex:1;max-width:220px}

/* Modales */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal-box{background:white;border-radius:10px;padding:22px;width:90%;max-height:88vh;overflow:auto;box-shadow:0 8px 32px rgba(0,0,0,.2)}
.modal-box h3{margin-bottom:14px;font-size:16px}
.modal-field{margin-bottom:12px}
.modal-field label{display:block;font-size:13px;font-weight:bold;margin-bottom:5px}
.modal-field input,.modal-field textarea{width:100%;padding:7px 9px;border:1px solid #CCC;border-radius:5px;font-size:13px}
.modal-field textarea{resize:vertical;font-family:monospace;font-size:12px}
.modal-hint{font-size:11px;color:#757575;margin-top:4px;line-height:1.5}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
.btn-primary{padding:7px 18px;background:#1565C0;color:white;border:none;border-radius:5px;cursor:pointer;font-weight:bold}
.btn-secondary{padding:7px 18px;background:#9E9E9E;color:white;border:none;border-radius:5px;cursor:pointer;font-weight:bold}
.modal-error{color:#C62828;font-size:12px;margin-top:6px;display:none}

@media print{
  body{padding:0;background:white}
  #class-bar,.toolbar,.notes-top-bar,.mini-plan,.detail-actions,#plan-panel,#outils-panel,.btn-toggle,.btn-add-global,.ga-add-form,.ga-del,.global-acts-head button{display:none!important}
  #notes-panel{display:block!important;max-width:100%}
  .section-card,.chap-card,.obs-block,.global-acts-card{box-shadow:none;border:1px solid #CCC}
  .grille-collapse{display:block!important}
}
</style>
</head>
<body>
<h2>Plan de classe</h2>

<div id="class-bar">
  <div id="class-tabs"></div>
  <button id="btn-new-class">＋ Nouvelle classe</button>
</div>

<div class="toolbar">
  <button class="btn-tab active" id="tab-plan"   onclick="setTab('plan')">📐 Plan</button>
  <button class="btn-tab"        id="tab-outils" onclick="setTab('outils')">🚦 Outils</button>
  <button class="btn-tab"        id="tab-notes"  onclick="setTab('notes')">📋 Notes</button>
  <div class="sep" id="sep-view"></div>
  <button class="btn-view active" id="btn-normal" onclick="setMode('normal')">👨‍🏫 Normal</button>
  <button class="btn-view"        id="btn-miroir" onclick="setMode('miroir')">📺 Projeté</button>
  <button class="btn-reset"       id="btn-reset-plan" onclick="resetPlan()">↺ Reset</button>
</div>
<div id="status"></div>

<!-- PLAN -->
<div id="plan-panel">
  <div id="grid"></div>
  <div class="legend" id="legend"></div>
</div>

<!-- OUTILS -->
<div id="outils-panel" style="display:none">
  <div class="feu-card">
    <h3>🚦 Mode de travail</h3>
    <div class="feu-buttons">
      <button class="feu-btn fb-rouge"  id="fb-rouge"><span class="fb-icon">🔴</span><span class="fb-label">Silence</span><span class="fb-sub">Aucune communication</span></button>
      <button class="feu-btn fb-orange" id="fb-orange"><span class="fb-icon">🟠</span><span class="fb-label">Chuchotement</span><span class="fb-sub">Voix très basse</span></button>
      <button class="feu-btn fb-vert"   id="fb-vert"><span class="fb-icon">🟢</span><span class="fb-label">Parler normalement</span><span class="fb-sub">Travail en groupe</span></button>
      <button class="feu-btn fb-bleu"   id="fb-bleu"><span class="fb-icon">🔵</span><span class="fb-label">Écouter le prof</span><span class="fb-sub">Silence — attention</span></button>
    </div>
    <div class="feu-display" id="feu-display">
      <span class="fd-icon">🚦</span>
      <div><div class="fd-label">Mode de travail</div><div class="fd-sub">Cliquer sur une couleur</div></div>
    </div>
  </div>
  <div class="timer-card">
    <h3>⏱ Minuteur</h3>
    <div class="timer-body">
      <div id="timer-display">05:00</div>
      <div class="timer-set">
        <button class="t-adj" id="t-minus">−</button>
        <input type="number" id="timer-min" value="5" min="1" max="99">
        <span style="font-size:14px;color:#555">min</span>
        <button class="t-adj" id="t-plus">+</button>
      </div>
      <div class="timer-presets">
        <button class="t-preset" data-min="2">2 min</button><button class="t-preset" data-min="5">5 min</button>
        <button class="t-preset" data-min="10">10 min</button><button class="t-preset" data-min="15">15 min</button>
        <button class="t-preset" data-min="20">20 min</button><button class="t-preset" data-min="30">30 min</button>
      </div>
      <div class="timer-btns">
        <button class="t-start" id="t-start-btn">▶ Start</button>
        <button class="t-reset-btn" id="t-reset-btn">↺ Reset</button>
      </div>
    </div>
  </div>
</div>

<!-- NOTES -->
<div id="notes-panel" style="display:none">
  <!-- Chapitre -->
  <div class="notes-top-bar">
    <label>📖 Chapitre :</label>
    <input type="text" id="situation" placeholder="ex : Chapitre 3 — Circuits électriques">
  </div>

  <!-- Activités globales (communes à tous les groupes) -->
  <div class="global-acts-card">
    <div class="global-acts-head">
      <span class="ga-title">📝 Activités du chapitre <span id="ga-count" style="opacity:.6;font-weight:normal;font-size:11px"></span></span>
      <button class="btn-add-global" id="btn-add-global">+ Nouvelle activité</button>
    </div>
    <div class="ga-add-form" id="ga-add-form">
      <label>Nom :</label>
      <input type="text" class="ga-inp-nom" id="ga-inp-nom" placeholder="ex : TP Câblage, Exercice 3…">
      <label>Coeff :</label>
      <input type="number" class="ga-inp-coeff" id="ga-inp-coeff" value="1" min="0.5" max="10" step="0.5">
      <button class="ga-btn-ok" id="ga-btn-ok">✓ Ajouter</button>
      <button class="ga-btn-cancel" id="ga-btn-cancel">✗</button>
    </div>
    <div class="ga-list" id="ga-list"></div>
  </div>

  <!-- Mini plan -->
  <div class="mini-plan" id="mini-plan"></div>

  <!-- Détail groupe -->
  <div id="grp-detail"></div>
</div>

<!-- Modale classe -->
<div class="modal-overlay" id="class-modal">
  <div class="modal-box" style="max-width:500px">
    <h3 id="cm-title">Nouvelle classe</h3>
    <div class="modal-field">
      <label>Nom de la classe</label>
      <input type="text" id="cm-name" placeholder="ex : 5DE TSP">
    </div>
    <div class="modal-field">
      <label>Élèves — un par ligne : <code>Prénom Nom, numéro_groupe</code></label>
      <textarea id="cm-students" rows="14" placeholder="AMIRA Kamelia, 2&#10;BOETTO Valentin, 1&#10;..."></textarea>
      <div class="modal-hint">• Groupes 1–8, max 3 élèves/groupe, max 24 élèves<br>• Groupes pairs → gauche, impairs → droite</div>
      <div class="modal-error" id="cm-error"></div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" id="cm-cancel">Annuler</button>
      <button class="btn-primary"   id="cm-save">Créer</button>
    </div>
  </div>
</div>

<!-- Modale export -->
<div class="modal-overlay" id="export-modal">
  <div class="modal-box" style="max-width:600px">
    <h3>📤 Export CSV</h3>
    <pre id="export-pre" style="background:#1E272C;color:#AEDE76;padding:12px;border-radius:6px;overflow:auto;max-height:360px;font-size:11px;margin-bottom:12px"></pre>
    <div class="modal-footer">
      <button class="btn-primary"   id="btn-dl">⬇ Télécharger .csv</button>
      <button class="btn-secondary" id="btn-close-export">Fermer</button>
    </div>
  </div>
</div>

<script>
/* ════════════════════════════════════
   CONSTANTES
════════════════════════════════════ */
const GC={1:"#BBDEFB",2:"#C8E6C9",3:"#FFF9C4",4:"#F8BBD0",5:"#E1BEE7",6:"#FFE0B2",7:"#B2EBF2",8:"#D7CCC8"};
const GB={1:"#1565C0",2:"#2E7D32",3:"#F57F17",4:"#880E4F",5:"#6A1B9A",6:"#E65100",7:"#006064",8:"#4E342E"};
const MALUS=["Bavardages / agitation","Absence de matériel","Attitude inappropriée","Pas de mise au travail","Non coopération","Passivité / sans écoute","Travail non professionnel","Non-respect des délais"];
const BONUS=["Autonomie","Initiative / Propositions","Entraide","Travail soigné et complet","Respect consignes sécurité","Rangement et nettoyage","Participation active","Respect du matériel"];

/* ════════════════════════════════════
   DONNÉES
════════════════════════════════════ */
let actIdSeq=1;

// Note par groupe : malus/bonus attitudes + actNotes (actId→note) + attitudeCoeff
function emptyNote(){return{malus:Array(8).fill(0),bonus:Array(8).fill(0),obs:"",actNotes:{},attitudeCoeff:1};}
function emptyNotes(groups){const n={};groups.forEach(g=>n[g]=emptyNote());return n;}

function buildSeatGroups(sg){
  const a=Array(24).fill(null);
  for(let p=0;p<4;p++){const gR=sg[p*2]??null,gL=sg[p*2+1]??null,b=p*6;if(gL)a[b]=a[b+1]=a[b+2]=gL;if(gR)a[b+3]=a[b+4]=a[b+5]=gR;}
  return a;
}
function buildNames(students,sg){
  const byG={};students.forEach(({name,group})=>{if(!byG[group])byG[group]=[];byG[group].push(name);});
  const p={};return sg.map(g=>{if(!g||!byG[g])return null;if(p[g]==null)p[g]=0;return byG[g][p[g]++]??null;});
}
function parseStudents(text){
  const lines=text.split("\n").map(l=>l.trim()).filter(Boolean);
  const result=[],errs=[];
  lines.forEach((line,i)=>{
    const pts=line.split(/[,;]\s*/),name=(pts[0]||"").trim(),group=parseInt(pts[1]);
    if(!name){errs.push(`Ligne ${i+1}: nom manquant`);return;}
    if(isNaN(group)||group<1||group>8){errs.push(`Ligne ${i+1}: groupe invalide (${pts[1]})`);return;}
    result.push({name,group});
  });
  return{result,errs};
}
function createClass(id,name,students){
  const groups=[...new Set(students.map(s=>s.group))].sort((a,b)=>a-b);
  const sg=buildSeatGroups(groups),names=buildNames(students,sg);
  return{id,name,seatGroups:sg,initialNames:[...names],seats:[...names],activites:[],notes:emptyNotes(groups)};
}

const TSP=[
  {name:"AMIRA Kamelia",group:2},{name:"ANSCOMB Manu",group:2},{name:"DELALAY Raphael",group:2},
  {name:"RIACHI Adam",group:1},{name:"BOETTO Valentin",group:1},{name:"BORGOGNO Marco",group:1},
  {name:"COSTANZA Dana",group:4},{name:"D'ANGIO Lucie",group:4},{name:"GALLUA Noal",group:4},
  {name:"DELPECH Alessio",group:3},{name:"DUPEU Alexandre",group:3},{name:"GAGLIANO Lola",group:3},
  {name:"ABRIBAT Hugo",group:6},{name:"LEFRANÇOIS Isaac",group:6},
  {name:"HOARAU Alexandre",group:5},{name:"LACHET Fabio",group:5},{name:"PAYE William",group:5},
  {name:"PITIN Tristan",group:8},{name:"PONTHIER Camille",group:8},{name:"PUGLIESE Gianni",group:8},
  {name:"BOETTO Timothée",group:7},{name:"ROUX Emmy",group:7},{name:"SEMERDJIAN Matisse",group:7},
];
let classes=[createClass(1,"5DE TSP",TSP)],nextId=2,currentClassId=1;
const cc=()=>classes.find(c=>c.id===currentClassId);

/* Calculs */
const getGroups=()=>[...new Set(cc().seatGroups.filter(Boolean))].sort((a,b)=>a-b);
const getMembers=g=>cc().seatGroups.map((sg,i)=>sg===g&&cc().seats[i]?cc().seats[i]:null).filter(Boolean);

function calcNoteAtt(g){
  const s=cc().notes[g];if(!s)return 12;
  return Math.min(20,Math.max(0,12-s.malus.reduce((a,b)=>a+b,0)*2+s.bonus.reduce((a,b)=>a+b,0)*2));
}
function calcNoteChap(g){
  const s=cc().notes[g];if(!s)return 12;
  const ac=parseFloat(s.attitudeCoeff)||1;
  let pts=calcNoteAtt(g)*ac,coeff=ac;
  (cc().activites||[]).forEach(a=>{
    const n=parseFloat(s.actNotes?.[a.id]);const c=parseFloat(a.coeff)||1;
    if(!isNaN(n)&&n>=0){pts+=n*c;coeff+=c;}
  });
  return Math.round(pts/coeff*10)/10;
}
const nStyle=n=>n>=16?{bg:"#C8E6C9",col:"#1B5E20"}:n>=12?{bg:"#FFF9C4",col:"#F57F17"}:{bg:"#FFCDD2",col:"#B71C1C"};

/* ════════════════════════════════════
   CLASSES
════════════════════════════════════ */
function renderClassTabs(){
  const bar=document.getElementById("class-tabs");bar.innerHTML="";
  classes.forEach(cl=>{
    const t=document.createElement("div");t.className="class-tab"+(cl.id===currentClassId?" active":"");
    t.innerHTML=`<span class="tab-name">${cl.name}</span>`
      +(cl.id===currentClassId?`<button class="tab-edit" title="Modifier">✎</button>`:"")
      +(classes.length>1?`<button class="tab-del">×</button>`:"");
    t.querySelector(".tab-name").addEventListener("click",()=>switchClass(cl.id));
    t.querySelector(".tab-edit")?.addEventListener("click",e=>{e.stopPropagation();openClassModal(cl.id);});
    t.querySelector(".tab-del")?.addEventListener("click",e=>{e.stopPropagation();if(confirm(`Supprimer "${cl.name}" ?`)){classes=classes.filter(c=>c.id!==cl.id);if(currentClassId===cl.id)currentClassId=classes[0].id;renderClassTabs();switchClass(currentClassId);}});
    bar.appendChild(t);
  });
}
function switchClass(id){currentClassId=id;selGrp=null;sel=null;document.getElementById("status").textContent="";renderClassTabs();renderPlan();if(currentTab==="notes"){selGrp=getGroups()[0];renderGlobalActs();renderMiniPlan();renderDetail();}}
document.getElementById("btn-new-class").addEventListener("click",()=>openClassModal(null));

let editingClassId=null;
function openClassModal(id){
  editingClassId=id;const cl=id?classes.find(c=>c.id===id):null;
  document.getElementById("cm-title").textContent=id?"Modifier":"Nouvelle classe";
  document.getElementById("cm-name").value=cl?.name||"";
  document.getElementById("cm-save").textContent=id?"Enregistrer":"Créer";
  document.getElementById("cm-error").style.display="none";
  if(cl){const rows=[];for(let i=0;i<24;i++){const n=cl.seats[i],g=cl.seatGroups[i];if(n&&g)rows.push(`${n}, ${g}`);}document.getElementById("cm-students").value=rows.join("\n");}
  else document.getElementById("cm-students").value="";
  document.getElementById("class-modal").classList.add("open");
}
document.getElementById("cm-cancel").addEventListener("click",()=>document.getElementById("class-modal").classList.remove("open"));
document.getElementById("cm-save").addEventListener("click",()=>{
  const name=document.getElementById("cm-name").value.trim(),errEl=document.getElementById("cm-error");
  if(!name){errEl.textContent="Nom requis.";errEl.style.display="block";return;}
  const{result:sts,errs}=parseStudents(document.getElementById("cm-students").value);
  if(errs.length){errEl.textContent=errs[0];errEl.style.display="block";return;}
  if(!sts.length){errEl.textContent="Aucun élève valide.";errEl.style.display="block";return;}
  errEl.style.display="none";
  if(editingClassId){const idx=classes.findIndex(c=>c.id===editingClassId);const nc=createClass(editingClassId,name,sts);nc.notes={...classes[idx].notes};nc.activites=[...classes[idx].activites];classes[idx]=nc;}
  else{classes.push(createClass(nextId++,name,sts));currentClassId=classes[classes.length-1].id;}
  document.getElementById("class-modal").classList.remove("open");
  renderClassTabs();switchClass(currentClassId);
});

/* ════════════════════════════════════
   PLAN
════════════════════════════════════ */
let sel=null,mode="normal",currentTab="plan";
const dtp=(dr,dc)=>mode==="normal"?(4-dr)*6+dc:(dr-1)*6+(7-dc);
function renderPlan(){
  const cl=cc(),grid=document.getElementById("grid");grid.innerHTML="";
  if(mode==="miroir")grid.insertAdjacentHTML("beforeend",`<div class="tableau">📋 TABLEAU</div>`);
  for(let dr=1;dr<=4;dr++){
    const row=document.createElement("div");row.className="row";
    for(let dc=1;dc<=6;dc++){
      if(dc===4){const g=document.createElement("div");g.className="gap-col";row.appendChild(g);}
      const pos=dtp(dr,dc),nom=cl.seats[pos-1],g=cl.seatGroups[pos-1];
      const div=document.createElement("div");
      div.className="cell"+(nom?" clickable":"")+(sel===pos?" selected":"");
      div.style.background=sel===pos?"#FFA726":(g?GC[g]:"#EEEEEE");
      div.style.border=`2px solid ${sel===pos?"#E65100":(g?GB[g]+"66":"#BDBDBD")}`;
      div.innerHTML=nom?`<span class="grp-label" style="color:${GB[g]}">Groupe ${g}</span><span>${nom}</span>`:`<span class="empty">—</span>`;
      div.addEventListener("click",()=>handleCellClick(pos));
      row.appendChild(div);
    }
    grid.appendChild(row);
  }
  if(mode==="normal")grid.insertAdjacentHTML("beforeend",`<div class="tableau">📋 TABLEAU</div>`);
  document.getElementById("legend").innerHTML=[...new Set(cc().seatGroups.filter(Boolean))].sort((a,b)=>a-b).map(g=>
    `<div class="legend-item"><div class="legend-swatch" style="background:${GC[g]};border-color:${GB[g]}"></div>Groupe ${g}</div>`).join("");
}
function handleCellClick(pos){
  const cl=cc(),nom=cl.seats[pos-1];
  if(!nom&&sel===null)return;
  if(sel===null){sel=pos;document.getElementById("status").textContent=`✔ ${nom} sélectionné`;renderPlan();return;}
  if(sel===pos){sel=null;document.getElementById("status").textContent="";renderPlan();return;}
  [cl.seats[pos-1],cl.seats[sel-1]]=[cl.seats[sel-1],cl.seats[pos-1]];
  sel=null;document.getElementById("status").textContent="";renderPlan();
}
function setMode(m){mode=m;document.getElementById("btn-normal").classList.toggle("active",m==="normal");document.getElementById("btn-miroir").classList.toggle("active",m==="miroir");renderPlan();}
function resetPlan(){const cl=cc();cl.seats=[...cl.initialNames];sel=null;document.getElementById("status").textContent="";renderPlan();}

/* ════════════════════════════════════
   FEU
════════════════════════════════════ */
const FEU={rouge:{bg:"#E53935",icon:"🔴",label:"SILENCE",sub:"Aucune communication"},orange:{bg:"#FB8C00",icon:"🟠",label:"CHUCHOTEMENT",sub:"Voix très basse"},vert:{bg:"#43A047",icon:"🟢",label:"PARLER NORMALEMENT",sub:"Travail en groupe"},bleu:{bg:"#1E88E5",icon:"🔵",label:"ÉCOUTER LE PROFESSEUR",sub:"Silence — attention"}};
["rouge","orange","vert","bleu"].forEach(c=>{
  document.getElementById("fb-"+c).addEventListener("click",()=>{
    document.querySelectorAll(".feu-btn").forEach(b=>b.classList.remove("feu-active"));
    document.getElementById("fb-"+c).classList.add("feu-active");
    const f=FEU[c],d=document.getElementById("feu-display");
    d.style.background=f.bg;d.style.color="white";
    d.innerHTML=`<span class="fd-icon">${f.icon}</span><div><div class="fd-label">${f.label}</div><div class="fd-sub">${f.sub}</div></div>`;
  });
});
document.getElementById("feu-display").addEventListener("click",()=>{
  document.querySelectorAll(".feu-btn").forEach(b=>b.classList.remove("feu-active"));
  const d=document.getElementById("feu-display");d.style.background="#EEEEEE";d.style.color="#9E9E9E";
  d.innerHTML=`<span class="fd-icon">🚦</span><div><div class="fd-label">Mode de travail</div><div class="fd-sub">Cliquer sur une couleur</div></div>`;
});

/* ════════════════════════════════════
   TIMER
════════════════════════════════════ */
let timerSec=300,timerRunning=false,timerInt=null;
const fmt=s=>`${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;
function updTimer(){const d=document.getElementById("timer-display");d.textContent=fmt(timerSec);d.className=timerRunning&&timerSec>0?"t-running":timerSec===0?"t-done":"";}
function doReset(){clearInterval(timerInt);timerRunning=false;document.getElementById("t-start-btn").textContent="▶ Start";timerSec=Math.max(1,parseInt(document.getElementById("timer-min").value)||5)*60;updTimer();}
function toggleTimer(){if(timerSec===0)doReset();timerRunning=!timerRunning;document.getElementById("t-start-btn").textContent=timerRunning?"⏸ Pause":"▶ Start";if(timerRunning){timerInt=setInterval(()=>{if(timerSec>0){timerSec--;updTimer();}else{clearInterval(timerInt);timerRunning=false;document.getElementById("t-start-btn").textContent="▶ Start";updTimer();}},1000);}else clearInterval(timerInt);}
document.getElementById("t-start-btn").addEventListener("click",toggleTimer);
document.getElementById("t-reset-btn").addEventListener("click",doReset);
document.getElementById("t-minus").addEventListener("click",()=>{const i=document.getElementById("timer-min");i.value=Math.max(1,(parseInt(i.value)||5)-1);doReset();});
document.getElementById("t-plus").addEventListener("click",()=>{const i=document.getElementById("timer-min");i.value=Math.min(99,(parseInt(i.value)||5)+1);doReset();});
document.querySelectorAll(".t-preset").forEach(b=>b.addEventListener("click",()=>{document.getElementById("timer-min").value=b.dataset.min;doReset();}));
document.getElementById("timer-min").addEventListener("change",doReset);

/* ════════════════════════════════════
   ONGLETS
════════════════════════════════════ */
let selGrp=null;
function setTab(t){
  currentTab=t;
  ["plan","outils","notes"].forEach(id=>{document.getElementById("tab-"+id).classList.toggle("active",id===t);document.getElementById(id+"-panel").style.display=id===t?"":"none";});
  document.querySelectorAll(".btn-view,.btn-reset,#sep-view").forEach(el=>el.style.display=t==="plan"?"":"none");
  if(t==="notes"){if(!selGrp)selGrp=getGroups()[0];renderGlobalActs();renderMiniPlan();renderDetail();}
}

/* ════════════════════════════════════
   ACTIVITÉS GLOBALES
════════════════════════════════════ */
function renderGlobalActs(){
  const acts=cc().activites||[];
  const cnt=document.getElementById("ga-count");
  if(cnt)cnt.textContent=acts.length?`(${acts.length} activité${acts.length>1?"s":""})` : "";
  const list=document.getElementById("ga-list");if(!list)return;
  if(acts.length===0){list.innerHTML=`<div class="ga-empty">Aucune activité — cliquez sur + Nouvelle activité</div>`;return;}
  list.innerHTML=acts.map(a=>`
    <div class="ga-row" data-id="${a.id}">
      <input type="text" class="ga-inp ga-inp-nom" value="${a.nom}" placeholder="Nom de l'activité" data-id="${a.id}">
      <span class="ga-lbl">coeff</span>
      <input type="number" class="ga-inp ga-inp-coeff" value="${a.coeff}" min="0.5" max="10" step="0.5" data-id="${a.id}">
      <button class="ga-del" data-id="${a.id}">×</button>
    </div>`).join("");

  list.querySelectorAll(".ga-inp-nom").forEach(inp=>inp.addEventListener("input",e=>{
    const act=cc().activites.find(a=>a.id===parseInt(e.target.dataset.id));
    if(act){act.nom=e.target.value;renderMiniPlan();refreshChap();}
  }));
  list.querySelectorAll(".ga-inp-coeff").forEach(inp=>inp.addEventListener("input",e=>{
    const act=cc().activites.find(a=>a.id===parseInt(e.target.dataset.id));
    if(act){act.coeff=parseFloat(e.target.value)||1;renderMiniPlan();refreshChap();}
  }));
  list.querySelectorAll(".ga-del").forEach(btn=>btn.addEventListener("click",()=>{
    const id=parseInt(btn.dataset.id);
    cc().activites=cc().activites.filter(a=>a.id!==id);
    getGroups().forEach(g=>{if(cc().notes[g]?.actNotes)delete cc().notes[g].actNotes[id];});
    renderGlobalActs();renderMiniPlan();renderDetail();
  }));
}

// Ajouter activité
document.getElementById("btn-add-global").addEventListener("click",()=>{
  document.getElementById("ga-add-form").classList.add("visible");
  document.getElementById("ga-inp-nom").focus();
});
document.getElementById("ga-btn-cancel").addEventListener("click",()=>{
  document.getElementById("ga-add-form").classList.remove("visible");
  document.getElementById("ga-inp-nom").value="";
  document.getElementById("ga-inp-coeff").value="1";
});
document.getElementById("ga-btn-ok").addEventListener("click",()=>{
  const nom=document.getElementById("ga-inp-nom").value.trim();
  if(!nom)return;
  const coeff=parseFloat(document.getElementById("ga-inp-coeff").value)||1;
  const id=actIdSeq++;
  cc().activites.push({id,nom,coeff});
  document.getElementById("ga-add-form").classList.remove("visible");
  document.getElementById("ga-inp-nom").value="";
  document.getElementById("ga-inp-coeff").value="1";
  renderGlobalActs();renderMiniPlan();renderDetail();
});
document.getElementById("ga-inp-nom").addEventListener("keydown",e=>{if(e.key==="Enter")document.getElementById("ga-btn-ok").click();});

// Mise à jour rapide de la note de chapitre sans re-render complet
function refreshChap(){
  const g=selGrp;
  const chap=calcNoteChap(g);const{bg:cBg,col:cCol}=nStyle(chap);
  const el=document.querySelector(".chap-note");
  if(el){el.textContent=chap;el.style.background=cBg;el.style.color=cCol;}
  const lg=document.querySelector(".grade-pill.lg");
  if(lg){lg.textContent=`${chap} / 20`;lg.style.background=cBg;lg.style.color=cCol;}
  // Rebuild formula
  const ff=document.getElementById("chap-formula-lines");
  if(ff){const s=cc().notes[g]||emptyNote();ff.innerHTML=buildFormulaHTML(s,calcNoteAtt(g));}
}

function buildFormulaHTML(s,att){
  const acts=cc().activites||[];
  let html="";
  acts.forEach(a=>{
    const n=parseFloat(s.actNotes?.[a.id]);
    html+=`<div class="cf-line"><span>${a.nom||"Activité"}</span><span class="cf-pts">${isNaN(n)?"—":n+"/20"} × ${a.coeff||1}</span></div>`;
  });
  const ac=s.attitudeCoeff||1;
  html+=`<div class="cf-line"><span>🎭 Attitudes</span><span class="cf-pts">${att}/20 × ${ac}</span></div>`;
  return html;
}

/* ════════════════════════════════════
   MINI PLAN
════════════════════════════════════ */
function renderMiniPlan(){
  const groups=getGroups();
  const layout=[];for(let i=0;i<groups.length;i+=2)layout.push([groups[i+1]??null,groups[i]]);
  const mp=document.getElementById("mini-plan");mp.innerHTML="";
  [...layout].reverse().forEach(([gl,gr])=>{
    const row=document.createElement("div");row.className="mini-row";
    [gl,gr].forEach((g,ci)=>{
      if(ci===1){const gp=document.createElement("div");gp.className="mini-gap";row.appendChild(gp);}
      if(!g){const e=document.createElement("div");e.style.width="200px";row.appendChild(e);return;}
      const att=calcNoteAtt(g),chap=calcNoteChap(g);
      const{bg:aBg,col:aCol}=nStyle(att),{bg:cBg,col:cCol}=nStyle(chap);
      const names=getMembers(g);
      const tile=document.createElement("div");
      tile.className="grp-tile"+(selGrp===g?" selected-grp":"");
      tile.style.background=GC[g]||"#EEE";tile.style.borderColor=selGrp===g?GB[g]||"#333":"transparent";
      tile.innerHTML=`<div class="gt-header">
        <span class="gt-num" style="color:${GB[g]||'#333'}">Groupe ${g}</span>
        <div class="gt-grades">
          <span class="gt-badge" style="background:${aBg};color:${aCol}" title="Attitudes">${att}</span>
          <span class="gt-badge" style="background:${cBg};color:${cCol}" title="Chapitre">📊${chap}</span>
        </div>
      </div>
      <div class="gt-names">${names.length?names.join("<br>"):"<em style='color:#999'>—</em>"}</div>`;
      tile.addEventListener("click",()=>{selGrp=g;renderMiniPlan();renderDetail();});
      row.appendChild(tile);
    });
    mp.appendChild(row);
  });
  mp.insertAdjacentHTML("beforeend",`<div class="mini-tableau">📋 TABLEAU</div>`);
}

/* ════════════════════════════════════
   DÉTAIL GROUPE
════════════════════════════════════ */
function renderDetail(){
  const groups=getGroups();if(!groups.includes(selGrp))selGrp=groups[0];
  const g=selGrp,cl=cc();
  if(!cl.notes[g])cl.notes[g]=emptyNote();
  const s=cl.notes[g];
  const att=calcNoteAtt(g),chap=calcNoteChap(g);
  const{bg:aBg,col:aCol}=nStyle(att),{bg:cBg,col:cCol}=nStyle(chap);
  const members=getMembers(g);
  const tm=s.malus.reduce((a,b)=>a+b,0)*2,tb=s.bonus.reduce((a,b)=>a+b,0)*2;
  const idx=groups.indexOf(g),prev=groups[(idx-1+groups.length)%groups.length],next=groups[(idx+1)%groups.length];
  const acts=cl.activites||[];

  document.getElementById("grp-detail").innerHTML=`
  <div class="det-header">
    <div class="dh-left">
      <button class="nav-btn" id="nav-prev">◀</button>
      <div><div class="dh-title" style="color:${GB[g]||'#333'}">Groupe ${g}</div><div class="dh-members">${members.join(" · ")||"(aucun élève)"}</div></div>
      <button class="nav-btn" id="nav-next">▶</button>
    </div>
    <div class="dh-grades">
      <div class="grade-box"><div class="gb-lbl">Attitudes</div><div class="grade-pill sm" style="background:${aBg};color:${aCol}">${att} / 20</div></div>
      <div class="grade-box"><div class="gb-lbl">📊 Chapitre</div><div class="grade-pill lg" style="background:${cBg};color:${cCol}">${chap} / 20</div></div>
    </div>
  </div>

  <!-- Notes d'activités par groupe -->
  <div class="section-card">
    <div class="sec-head"><span class="sec-title">📝 Notes d'activités</span></div>
    <div style="padding:8px 12px">
      ${acts.length===0
        ?`<div class="act-empty">Aucune activité définie — ajoutez-en dans la section ci-dessus</div>`
        :`<table class="act-notes-table">
          <thead><tr><th>Activité</th><th style="text-align:center">Coeff.</th><th style="text-align:center">Note /20</th></tr></thead>
          <tbody>
            ${acts.map(a=>`<tr>
              <td>${a.nom||"Activité"}</td>
              <td class="td-coeff">×${a.coeff||1}</td>
              <td style="text-align:center">
                <input class="act-note-inp" type="number" value="${s.actNotes?.[a.id]??''}" min="0" max="20" step="0.5" placeholder="—" data-actid="${a.id}">
              </td>
            </tr>`).join("")}
          </tbody>
        </table>`
      }
    </div>
  </div>

  <!-- Attitudes -->
  <div class="section-card">
    <div class="sec-head">
      <span class="sec-title">🎭 Attitudes — <strong>${att}/20</strong></span>
      <div class="sec-head-right">
        <div class="att-coeff-row"><label>Coeff :</label><input type="number" id="att-coeff" value="${s.attitudeCoeff??1}" min="0" max="10" step="0.5"></div>
        <button class="btn-toggle" id="btn-toggle-grille">▼ Détail</button>
      </div>
    </div>
    <div class="grille-collapse" id="grille-collapse">
      <div class="grille-head"><div class="hm">◀ MALUS</div><div></div><div class="hb">BONUS ▶</div></div>
      ${MALUS.map((m,i)=>`<div class="gline">
        <div class="side-malus">
          <span class="crit-lbl ml">${m}</span>
          <span class="pts-lbl mp" style="visibility:${s.malus[i]?"visible":"hidden"}">−${s.malus[i]*2}pts</span>
          <div class="counter"><button class="c-dec" data-type="malus" data-i="${i}">−</button><span class="c-val" style="color:${s.malus[i]>0?"#C62828":"#999"}">${s.malus[i]}</span><button class="c-inc" data-type="malus" data-i="${i}">+</button></div>
        </div>
        <div style="text-align:center;font-size:10px;color:#9E9E9E">${i===3?`<strong style="font-size:13px;color:#555">12</strong><br>/20`:"·"}</div>
        <div class="side-bonus">
          <div class="counter"><button class="c-dec" data-type="bonus" data-i="${i}">−</button><span class="c-val" style="color:${s.bonus[i]>0?"#2E7D32":"#999"}">${s.bonus[i]}</span><button class="c-inc" data-type="bonus" data-i="${i}">+</button></div>
          <span class="pts-lbl bp" style="visibility:${s.bonus[i]?"visible":"hidden"}">+${s.bonus[i]*2}pts</span>
          <span class="crit-lbl">${BONUS[i]}</span>
        </div>
      </div>`).join("")}
      <div class="totals-bar">
        <span style="color:#C62828">Malus : −${tm}pts</span><span style="color:#999">|</span>
        <span style="color:#2E7D32">Bonus : +${tb}pts</span><span style="color:#999">|</span>
        <span>Attitudes : <strong>${att}/20</strong></span>
      </div>
    </div>
  </div>

  <!-- Note de chapitre -->
  <div class="chap-card">
    <div class="chap-formula">
      <div class="cf-title">Moyenne pondérée</div>
      <div id="chap-formula-lines">${buildFormulaHTML(s,att)}</div>
    </div>
    <div class="chap-result">
      <div class="cr-lbl">📊 École Directe</div>
      <div class="chap-note" style="background:${cBg};color:${cCol}">${chap}</div>
      <div class="chap-hint">/ 20</div>
    </div>
  </div>

  <div class="obs-block"><label>📝 Observations</label><textarea id="obs-field">${s.obs}</textarea></div>
  <div class="detail-actions">
    <button class="btn-act btn-clear"    id="btn-clear-grp">🗑 Réinitialiser</button>
    <button class="btn-act btn-export"   id="btn-export">📤 Exporter CSV</button>
    <button class="btn-act btn-next-grp" id="btn-next-grp">Groupe suivant ▶ (G${next})</button>
  </div>`;

  const det=document.getElementById("grp-detail");

  // Nav
  det.querySelector("#nav-prev").addEventListener("click",()=>{selGrp=prev;renderMiniPlan();renderDetail();});
  det.querySelector("#nav-next").addEventListener("click",()=>{selGrp=next;renderMiniPlan();renderDetail();});
  det.querySelector("#btn-next-grp").addEventListener("click",()=>{selGrp=next;renderMiniPlan();renderDetail();});
  det.querySelector("#btn-clear-grp").addEventListener("click",()=>{cc().notes[g]=emptyNote();renderMiniPlan();renderDetail();});
  det.querySelector("#btn-export").addEventListener("click",openExport);
  det.querySelector("#obs-field").addEventListener("input",e=>{cc().notes[g].obs=e.target.value;});

  // Att coeff
  det.querySelector("#att-coeff").addEventListener("input",e=>{s.attitudeCoeff=parseFloat(e.target.value)||1;renderMiniPlan();refreshChap();});

  // Toggle grille
  det.querySelector("#btn-toggle-grille").addEventListener("click",function(){
    const c=document.getElementById("grille-collapse"),open=c.classList.toggle("open");
    this.textContent=open?"▲ Masquer":"▼ Détail";
  });

  // Compteurs attitudes
  det.querySelectorAll(".c-dec,.c-inc").forEach(btn=>btn.addEventListener("click",()=>{
    const type=btn.dataset.type,i=parseInt(btn.dataset.i),delta=btn.classList.contains("c-inc")?1:-1;
    s[type][i]=Math.max(0,s[type][i]+delta);renderMiniPlan();renderDetail();
  }));

  // Notes activités (délégation sur le tableau)
  det.querySelectorAll(".act-note-inp").forEach(inp=>inp.addEventListener("input",e=>{
    const id=parseInt(e.target.dataset.actid);
    if(!s.actNotes)s.actNotes={};
    s.actNotes[id]=e.target.value===""?null:parseFloat(e.target.value);
    renderMiniPlan();refreshChap();
  }));
}

/* ════════════════════════════════════
   EXPORT CSV
════════════════════════════════════ */
function buildCsv(){
  const cl=cc(),sit=document.getElementById("situation")?.value||"—",groups=getGroups();
  const acts=cl.activites||[];
  const actHeaders=acts.flatMap(a=>[a.nom+" note",a.nom+" coeff"]);
  const header=["Classe","Groupe","Élèves","Chapitre",...actHeaders,"Coeff attitudes","Note attitudes","Note chapitre","Observations"];
  const rows=[header];
  groups.forEach(g=>{
    const s=cl.notes[g]||emptyNote(),n=calcNoteChap(g),att=calcNoteAtt(g);
    const actCols=acts.flatMap(a=>[s.actNotes?.[a.id]??"",a.coeff||1]);
    rows.push([cl.name,g,getMembers(g).join(" / "),sit,...actCols,s.attitudeCoeff||1,att,n,(s.obs||"").replace(/\n/g," ")]);
  });
  return rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(";")).join("\n");
}
function openExport(){document.getElementById("export-pre").textContent=buildCsv();document.getElementById("export-modal").classList.add("open");}
document.getElementById("btn-dl").addEventListener("click",()=>{
  const sit=(document.getElementById("situation")?.value||"notes").replace(/[^a-zA-Z0-9]/g,"_");
  const blob=new Blob(["\uFEFF"+buildCsv()],{type:"text/csv;charset=utf-8;"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`${cc().name.replace(/\s/g,"_")}_${sit}.csv`;a.click();
});
document.getElementById("btn-close-export").addEventListener("click",()=>document.getElementById("export-modal").classList.remove("open"));

/* ════ INIT ════ */
renderClassTabs();renderPlan();
</script>
</body>
</html>
